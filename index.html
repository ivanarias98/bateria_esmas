<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batería ESMAS-ES+ — sesión completa</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%); color:#f8fafc; min-height:100vh; }
    #topbar { padding:14px 24px; background:rgba(15,23,42,0.97); border-bottom:3px solid #a855f7; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; position:sticky; top:0; z-index:200; }
    #topbar h1 { font-size:16px; color:#a855f7; }
    #topbar .nav { display:flex; gap:8px; }
    #topbar button { padding:8px 16px; border-radius:8px; border:2px solid #475569; background:rgba(30,41,59,0.6); color:#cbd5e1; font-size:12px; font-weight:bold; cursor:pointer; }
    #topbar button.active { border-color:#a855f7; background:rgba(168,85,247,0.2); color:#f5f3ff; }
    #appRoot { min-height:calc(100vh - 54px); }

    /* ===== Pantalla de inicio ===== */
    .home-wrap { max-width:900px; margin:0 auto; padding:36px 20px 60px; }
    .home-wrap h2 { font-size:24px; color:#a855f7; margin-bottom:6px; text-align:center; }
    .home-wrap .sub { font-size:13px; color:#94a3b8; text-align:center; margin-bottom:30px; }
    .exp-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
    .exp-card { background:rgba(30,41,59,0.9); border:2px solid #334155; border-radius:14px; padding:20px; cursor:pointer; transition:all .15s; }
    .exp-card:hover { border-color:#a855f7; background:rgba(168,85,247,0.1); transform:translateY(-2px); }
    .exp-card .num { display:inline-block; font-size:11px; font-weight:bold; background:#a855f7; color:white; padding:3px 9px; border-radius:12px; margin-bottom:10px; }
    .exp-card h3 { font-size:16px; color:#f5f3ff; margin-bottom:8px; }
    .exp-card p { font-size:12px; color:#94a3b8; line-height:1.6; }
    .exp-card .tag { display:inline-block; font-size:10px; color:#c084fc; text-transform:uppercase; letter-spacing:1px; margin-top:10px; }
    .session-note { text-align:center; font-size:11px; color:#64748b; margin-top:30px; }
    .exp-card { position:relative; }
    .exp-card .level-badge { position:absolute; top:16px; right:16px; font-size:9px; font-weight:bold; text-transform:uppercase; letter-spacing:.5px; padding:3px 8px; border-radius:10px; }
    .exp-card .level-badge.inicio { background:rgba(16,185,129,0.18); color:#6ee7b7; border:1px solid #10b981; }
    .exp-card .level-badge.especialista { background:rgba(236,72,153,0.18); color:#f9a8d4; border:1px solid #ec4899; }
    .group-title { font-size:13px; color:#c084fc; text-transform:uppercase; letter-spacing:1.5px; margin:26px 0 12px; padding-top:14px; border-top:1px solid #334155; }
    .group-title:first-of-type { border-top:none; padding-top:0; margin-top:6px; }
    .group-sub { font-size:11px; color:#64748b; margin:-8px 0 12px; }

    .info-banner { max-width:900px; margin:0 auto 22px; background:rgba(59,130,246,0.08); border:1px solid #3b82f6; border-radius:10px; padding:12px 16px; font-size:12px; color:#dbeafe; line-height:1.6; }
    .info-banner b { color:#93c5fd; }
    .contact-line { text-align:center; font-size:14px; color:#f5f3ff; margin-top:14px; font-weight:bold; background:rgba(168,85,247,0.12); border:1px solid #a855f7; border-radius:8px; padding:10px 14px; }
    .contact-line a { color:#e9d5ff; text-decoration:underline; font-weight:bold; }

    /* ===== Pantalla de acceso / consentimento ===== */
    .intake-wrap { max-width:640px; margin:40px auto; padding:0 20px 60px; }
    .intake-card { background:rgba(30,41,59,0.95); border:3px solid #a855f7; border-radius:15px; padding:32px 34px; }
    .intake-card h2 { color:#a855f7; font-size:21px; margin-bottom:10px; text-align:center; }
    .intake-consent { background:rgba(168,85,247,0.08); border:1px dashed #a855f7; border-radius:10px; padding:14px 16px; font-size:12.5px; color:#e2e8f0; line-height:1.65; margin-bottom:22px; }
    .intake-q { margin-bottom:20px; }
    .intake-q .q-title { font-size:13px; }
    .btn-consent-check { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:8px; border:2px solid #334155; cursor:pointer; font-size:12.5px; color:#cbd5e1; margin-bottom:18px; }
    .btn-consent-check.selected { border-color:#10b981; background:rgba(16,185,129,0.1); color:#f0fdf4; }
    .btn-consent-check input { margin-top:2px; accent-color:#10b981; width:16px; height:16px; flex-shrink:0; }

    /* ===== Punto de partida del rato (normaliza el inicio del mouse-tracking) ===== */
    .start-gate { position:absolute; inset:0; background:rgba(15,23,42,0.93); border-radius:15px; display:flex; flex-direction:column; align-items:center; z-index:80; text-align:center; padding:28px 20px 20px; pointer-events:none; }
    .start-gate-target { pointer-events:auto; width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .start-gate-dot { width:22px; height:22px; border-radius:50%; background:#a855f7; box-shadow:0 0 0 8px rgba(168,85,247,0.25); animation:pulseDot 1.4s infinite; }
    .start-gate-label { margin-top:14px; font-size:13px; color:#e2e8f0; font-weight:600; max-width:280px; }
    @keyframes pulseDot { 0%,100%{transform:scale(1);} 50%{transform:scale(1.25);} }

    /* ===== Shell compartido por los módulos de experimento ===== */
    .mod-banner { background:#7c2d12; color:#fed7aa; text-align:center; font-size:11px; padding:6px; letter-spacing:1px; }
    .mod-header { padding:18px; text-align:center; background:rgba(15,23,42,0.95); border-bottom:3px solid #a855f7; }
    .mod-header h2 { font-size:21px; margin-bottom:4px; color:#a855f7; }
    .mod-header p { font-size:12px; color:#94a3b8; font-style:italic; }
    .mod-back { position:absolute; top:14px; left:16px; z-index:60; padding:7px 14px; border-radius:8px; border:2px solid #475569; background:rgba(15,23,42,0.8); color:#cbd5e1; font-size:11px; font-weight:bold; cursor:pointer; }
    .mod-back:hover { border-color:#ec4899; color:#f9a8d4; }
    .mod-main { position:relative; min-height:70vh; display:flex; flex-direction:column; align-items:center; padding:26px 20px 60px; }

    .progress-bar { width:100%; max-width:760px; display:flex; justify-content:space-between; font-size:12px; color:#94a3b8; margin-bottom:6px;}
    .progress-track { width:100%; max-width:760px; height:4px; background:#1e293b; border-radius:4px; overflow:hidden; margin-bottom:22px; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#a855f7,#ec4899); transition:width .3s ease; }

    .card { background:rgba(30,41,59,0.95); border:3px solid #a855f7; border-radius:15px; padding:30px 36px; max-width:760px; width:100%; box-shadow:0 10px 30px rgba(168,85,247,0.2); }
    .phrase-label,.noun-title { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:#94a3b8; margin-bottom:6px; }
    .phrase,.noun-value { font-size:24px; font-weight:bold; color:#e2e8f0; margin-bottom:18px; }
    .noun-value { color:#a855f7; text-align:center; }
    .phrase .noun, .stimulus-phrase .noun { color:#a855f7; text-decoration:underline; }
    .route-box { background:rgba(168,85,247,0.08); border:2px dashed #a855f7; border-radius:10px; padding:14px 18px; margin-bottom:20px; }
    .route-box-label { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:#c084fc; margin-bottom:6px; }
    .route-path { font-size:15px; color:#f5f3ff; font-weight:600; line-height:1.5; }

    .q-block { margin-bottom:20px; } .q-title { font-size:14px; color:#cbd5e1; margin-bottom:10px; font-weight:600; }
    .binary-row { display:flex; gap:14px; } .btn-bin { flex:1; padding:13px; border-radius:10px; border:3px solid transparent; font-size:14px; font-weight:bold; cursor:pointer; }
    .btn-si { background:rgba(16,185,129,0.15); border-color:#10b981; color:#6ee7b7; } .btn-si.selected,.btn-si:hover{background:#10b981;color:#052e1f;}
    .btn-no { background:rgba(236,72,153,0.15); border-color:#ec4899; color:#f9a8d4; } .btn-no.selected,.btn-no:hover{background:#ec4899;color:#3b0521;}

    .bins-row,.options-row { display:flex; gap:8px; flex-wrap:wrap; }
    .btn-bin-pct,.opt-btn { flex:1; min-width:110px; padding:10px 8px; border-radius:8px; border:2px solid #475569; background:rgba(15,23,42,0.6); color:#cbd5e1; font-size:12px; font-weight:600; cursor:pointer; text-align:center; }
    .btn-bin-pct.selected,.btn-bin-pct:hover,.opt-btn.selected,.opt-btn:hover { border-color:#a855f7; background:rgba(168,85,247,0.25); color:#f5f3ff; }

    .checks-row { display:flex; flex-direction:column; gap:8px; }
    .check-item { display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; border:2px solid #334155; cursor:pointer; font-size:13px; color:#cbd5e1; }
    .check-item.selected { border-color:#a855f7; background:rgba(168,85,247,0.12); color:#f5f3ff; }
    .check-item input { accent-color:#a855f7; width:16px; height:16px; }

    .btn-continue,.btn-next { margin-top:8px; width:100%; padding:14px; border-radius:10px; border:none; background:linear-gradient(135deg,#a855f7,#7c3aed); color:white; font-weight:bold; font-size:15px; cursor:pointer; opacity:.4; pointer-events:none; }
    .btn-continue.ready,.btn-next.ready { opacity:1; pointer-events:auto; }

    textarea.comment-box { width:100%; min-height:64px; padding:11px 13px; border-radius:10px; border:2px solid #334155; background:rgba(15,23,42,0.6); color:#e2e8f0; font-family:inherit; font-size:13px; resize:vertical; }

    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index:300; }
    .modal.hidden { display:none; }
    .modal-content { background:#0f172a; border:3px solid #a855f7; border-radius:15px; padding:38px; max-width:600px; text-align:left; max-height:85vh; overflow-y:auto; }
    .modal-content h2 { font-size:25px; margin-bottom:15px; color:#a855f7; text-align:center; }
    .modal-content p { margin-bottom:11px; line-height:1.65; color:#e2e8f0; font-size:13.5px; }
    .modal-content .example { background:rgba(168,85,247,0.08); border-left:3px solid #a855f7; padding:8px 14px; margin:10px 0; font-size:12px; color:#cbd5e1; font-family:monospace; white-space:pre-line; }
    .modal-buttons { display:flex; gap:10px; justify-content:center; margin-top:20px; }
    .btn-modal { padding:11px 24px; border:2px solid #a855f7; background:transparent; color:#a855f7; border-radius:8px; cursor:pointer; font-weight:bold; text-transform:uppercase; font-size:12px; }
    .btn-modal.primary { background:#a855f7; color:#0f172a; }
    .stat-row { display:flex; justify-content:space-around; margin:16px 0; flex-wrap:wrap; gap:10px; }
    .stat { text-align:center; } .stat-value { font-size:24px; font-weight:bold; color:#a855f7; } .stat-label { font-size:10px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; }

    canvas.trail-canvas { position:absolute; top:0; left:0; z-index:1; pointer-events:none; }

    #saveStatusGlobal { position:fixed; bottom:12px; right:16px; font-size:11px; color:#64748b; z-index:250; }

    /* ===== Panel profesor ===== */
    .prof-wrap { padding:22px 28px; }
    .prof-toolbar { display:flex; gap:12px; align-items:center; margin-bottom:18px; flex-wrap:wrap; }
    .btn-refresh { padding:10px 18px; border-radius:8px; border:2px solid #10b981; background:rgba(16,185,129,0.12); color:#6ee7b7; font-weight:bold; font-size:12px; cursor:pointer; }
    .upload-zone { border:2px dashed #475569; border-radius:8px; padding:9px 15px; font-size:11px; color:#94a3b8; cursor:pointer; }
    .upload-zone:hover { border-color:#a855f7; color:#e2e8f0; }
    .upload-zone input { display:none; }
    .btn-export { padding:10px 18px; border-radius:8px; border:2px solid #a855f7; background:rgba(168,85,247,0.12); color:#c084fc; font-weight:bold; font-size:12px; cursor:pointer; }
    .status-line { font-size:11px; color:#64748b; }
    .prof-layout { display:grid; grid-template-columns:230px 1fr; gap:22px; }
    .prof-nav button { width:100%; text-align:left; padding:10px 12px; border-radius:8px; border:2px solid transparent; background:rgba(30,41,59,0.6); color:#cbd5e1; font-size:12px; cursor:pointer; margin-bottom:6px; display:flex; justify-content:space-between; }
    .prof-nav button.active { border-color:#a855f7; background:rgba(168,85,247,0.15); color:#f5f3ff; }
    .prof-nav button .count { font-size:10px; background:#334155; color:#94a3b8; padding:2px 7px; border-radius:10px; }
    .prof-main .panel { background:rgba(30,41,59,0.85); border:1px solid #334155; border-radius:12px; padding:18px 20px; margin-bottom:18px; }
    .prof-main .panel h4 { font-size:12px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
    .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .bar-label { width:210px; font-size:12px; color:#cbd5e1; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .bar-track { flex:1; height:19px; background:#0f172a; border-radius:6px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#a855f7,#c084fc); }
    .bar-fill.green { background:linear-gradient(90deg,#10b981,#34d399); }
    .bar-fill.pink { background:linear-gradient(90deg,#ec4899,#f472b6); }
    .bar-value { width:38px; text-align:right; font-size:11px; font-weight:bold; color:#e2e8f0; }
    .comment-item { background:rgba(168,85,247,0.06); border-left:3px solid #a855f7; padding:8px 12px; margin-bottom:7px; font-size:12px; color:#e2e8f0; }
    .comment-item .meta { font-size:10px; color:#94a3b8; margin-bottom:2px; }

    /* ===== Vista de aula — pensada para proyectar, letra grande, poco texto ===== */
    .aula-wrap { max-width:1100px; margin:0 auto; padding:30px 30px 60px; }
    .aula-toolbar { display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:26px; }
    .aula-tab { padding:12px 20px; border-radius:10px; border:2px solid #475569; background:rgba(30,41,59,0.7); color:#cbd5e1; font-size:15px; font-weight:bold; cursor:pointer; }
    .aula-tab.active { border-color:#a855f7; background:rgba(168,85,247,0.22); color:#f5f3ff; }
    .aula-tab:disabled { opacity:.3; cursor:not-allowed; }
    .aula-refresh { padding:12px 20px; border-radius:10px; border:2px solid #10b981; background:rgba(16,185,129,0.15); color:#6ee7b7; font-size:15px; font-weight:bold; cursor:pointer; }
    .aula-status { text-align:center; font-size:13px; color:#64748b; margin-bottom:20px; }
    .aula-title { font-size:32px; color:#a855f7; text-align:center; margin-bottom:6px; font-weight:bold; }
    .aula-question { font-size:17px; color:#94a3b8; text-align:center; margin-bottom:34px; }
    .aula-stat-row { display:flex; gap:24px; justify-content:center; flex-wrap:wrap; margin-bottom:36px; }
    .aula-stat { background:rgba(30,41,59,0.9); border:2px solid #334155; border-radius:16px; padding:24px 36px; text-align:center; min-width:180px; }
    .aula-stat .num { font-size:56px; font-weight:bold; color:#a855f7; line-height:1; }
    .aula-stat .lbl { font-size:14px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; margin-top:8px; }
    .aula-section-title { font-size:15px; color:#c084fc; text-transform:uppercase; letter-spacing:1.5px; margin:10px 0 16px; text-align:center; }
    .aula-bar-row { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
    .aula-bar-label { width:320px; font-size:17px; color:#e2e8f0; flex-shrink:0; text-align:right; }
    .aula-bar-track { flex:1; height:36px; background:#0f172a; border-radius:10px; overflow:hidden; border:1px solid #1e293b; }
    .aula-bar-fill { height:100%; border-radius:10px; background:linear-gradient(90deg,#a855f7,#c084fc); display:flex; align-items:center; justify-content:flex-end; padding-right:10px; transition:width .4s ease; }
    .aula-bar-fill.green { background:linear-gradient(90deg,#10b981,#34d399); }
    .aula-bar-fill.pink { background:linear-gradient(90deg,#ec4899,#f472b6); }
    .aula-bar-value { font-size:15px; font-weight:bold; color:#0f172a; }
    .aula-empty { text-align:center; color:#64748b; font-size:18px; margin-top:80px; line-height:1.8; }
    .aula-comment { background:rgba(168,85,247,0.08); border-left:4px solid #a855f7; padding:14px 18px; margin-bottom:12px; font-size:16px; color:#e2e8f0; border-radius:0 8px 8px 0; }
    .expected-tag { display:inline-block; font-size:9px; color:#0f172a; background:#fbbf24; padding:1px 6px; border-radius:8px; margin-left:6px; font-weight:bold; vertical-align:middle; }
</style>
</head>
<body>
<div id="topbar">
    <div id="logoSlot" style="display:flex; align-items:center; gap:10px;">
        <!-- Espazo reservado para outros logos institucionais se fixeren falta. -->
    </div>
    <h1>Batería ESMAS-ES+ — sesión completa</h1>
    <div class="nav">
        <button id="navHome" class="active" onclick="App.goHome()">🏠 Inicio</button>
        <button id="navAula" onclick="App.goAula()">🖥️ Vista de aula</button>
        <button id="navProf" onclick="App.goProfesor()">📊 Modo profesor</button>
    </div>

<script>
/* ============================================================
   UTILIDADES COMPARTIDAS
   ============================================================ */
const SESSION_ID = (crypto.randomUUID ? crypto.randomUUID() : ('s_' + Date.now() + '_' + Math.random().toString(36).slice(2)));
const CONTACT_EMAIL = 'ivanarias.arias@usc.es';

function setSaveStatus(msg) {
    document.getElementById('saveStatusGlobal').textContent = msg;
}

async function saveShared(prefix, data) {
    try {
        const result = await window.storage.set(prefix + SESSION_ID, JSON.stringify(data), true);
        setSaveStatus(result ? '✅ Enviado (' + new Date().toLocaleTimeString() + ')' : '⚠️ No se pudo enviar — descargando copia local, envíela por favor a ' + CONTACT_EMAIL);
        return !!result;
    } catch (e) {
        console.error('Fallo al enviar con trayectorias completas, reintentando sin ellas:', e);
        // Reintento: los datos de trayectoria (mouse-tracking) son lo más pesado del payload.
        // Si el envío falla, se reintenta una vez sin ellos para no perder el resto de la respuesta.
        try {
            const stripped = data.map(d => {
                if (!d.trajectory) return d;
                const { trajectory, ...rest } = d;
                return Object.assign({}, rest, { trajectory_omitted_by_retry: true, trajectory_point_count: trajectory.length });
            });
            const result2 = await window.storage.set(prefix + SESSION_ID, JSON.stringify(stripped), true);
            if (result2) {
                setSaveStatus('✅ Enviado sin trayectorias detalladas (' + new Date().toLocaleTimeString() + ')');
                return true;
            }
        } catch (e2) {
            console.error('Segundo intento también falló:', e2);
        }
        setSaveStatus('⚠️ Sin almacenamiento compartido — copia local descargada, envíela por favor a ' + CONTACT_EMAIL);
        return false;
    }
}

// Punto de partida del rato: obliga a colocar el cursor siempre en el mismo sitio antes
// de cada ítem de mouse-tracking, para que las trayectorias arranquen desde una posición
// común y comparable entre participantes.
function armStartGate(cardEl, label, onReady) {
    const gate = document.createElement('div');
    gate.className = 'start-gate';
    gate.innerHTML = '<div class="start-gate-target"><div class="start-gate-dot"></div></div><div class="start-gate-label">' + (label || 'Coloque el cursor en el punto para empezar') + '</div>';
    cardEl.style.position = 'relative';
    cardEl.appendChild(gate);
    const target = gate.querySelector('.start-gate-target');
    function onEnter() {
        target.removeEventListener('mouseenter', onEnter);
        gate.remove();
        onReady();
    }
    target.addEventListener('mouseenter', onEnter);
}

function downloadJSON(filename, data) {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

async function finishModule(prefix, filenamePrefix, data) {
    // Cada registro lleva su propio sessionId. Así, aunque se suba el JSON a mano
    // en el modo profesor (porque el guardado automático falló), se puede cruzar con el perfil
    // del participante sin depender del nombre del archivo ni de la clave de almacenamiento.
    const withSession = data.map(d => Object.assign({ sessionId: SESSION_ID }, d));
    const ok = await saveShared(prefix, withSession);
    if (!ok) {
        const ts = new Date().toISOString().replace(/[:.]/g,'-');
        downloadJSON(filenamePrefix + '_' + ts + '.json', withSession);
    }
}

function shuffle(a) { const arr = a.slice(); for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

function highlightNoun(phrase, noun) {
    const idx = phrase.toLowerCase().indexOf(noun.toLowerCase());
    if (idx === -1) return phrase;
    return phrase.slice(0,idx) + '<span class="noun">' + phrase.slice(idx, idx+noun.length) + '</span>' + phrase.slice(idx+noun.length);
}

// Canvas de mouse-tracking reutilizable, montado dentro de un contenedor de módulo
function setupTrailCanvas(container) {
    const canvas = document.createElement('canvas');
    canvas.className = 'trail-canvas';
    container.style.position = 'relative';
    container.prepend(canvas);
    function resize() { canvas.width = container.clientWidth; canvas.height = container.scrollHeight; }
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(container);
    const ctx = canvas.getContext('2d');
    const state = { tracking:false, startTime:null, trajectory:[] };
    let lastSample = 0;
    const SAMPLE_INTERVAL_MS = 40; // ~25 puntos/segundo — suficiente para analizar la trayectoria, mucho más ligero
    function onMove(e) {
        if (!state.tracking) return;
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top + container.scrollTop;
        const elapsed = Date.now() - state.startTime;
        // Siempre dibujar el trazo (fluido visualmente), pero solo GUARDAR un punto cada SAMPLE_INTERVAL_MS
        if (elapsed - lastSample >= SAMPLE_INTERVAL_MS || state.trajectory.length === 0) {
            state.trajectory.push({ x, y, time:elapsed });
            lastSample = elapsed;
        }
        ctx.strokeStyle = 'rgba(168,85,247,0.7)'; ctx.lineWidth = 2.5; ctx.lineCap='round'; ctx.lineJoin='round';
        if (state.trajectory.length > 1) {
            const prev = state.trajectory[state.trajectory.length-2];
            ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(x, y); ctx.stroke();
        }
    }
    document.addEventListener('mousemove', onMove);
    return {
        start() { state.tracking = true; state.startTime = Date.now(); state.trajectory = []; ctx.clearRect(0,0,canvas.width,canvas.height); },
        stop() { state.tracking = false; return state.trajectory; },
        clear() { ctx.clearRect(0,0,canvas.width,canvas.height); state.trajectory = []; },
        destroy() { document.removeEventListener('mousemove', onMove); ro.disconnect(); }
    };
}
</script>

<script>

   ============================================================ */
const MOD7 = (function(){
    const blocksBase = [
        { noun:'hospital', options:['Construcción','Organización','Lugar'], contexts:[
            { phrase:'El hospital fue construido en 1985.', expected:'Construcción' },
            { phrase:'El hospital anunció nuevas contrataciones.', expected:'Organización' },
            { phrase:'El hospital atendió a cien pacientes.', expected:'Organización' },
            { phrase:'Los turistas entraron en el hospital.', expected:'Lugar' }
        ]},
        { noun:'libro', options:['Objeto material','Contenido intelectual'], contexts:[
            { phrase:'El libro pesa dos kilos.', expected:'Objeto material' },
            { phrase:'El libro revolucionó la lingüística.', expected:'Contenido intelectual' },
            { phrase:'El libro se vendió en todas las librerías.', expected:'Objeto material' },
            { phrase:'El libro plantea una teoría original.', expected:'Contenido intelectual' }
        ]}
    ];

    function init(container, onDone) {
        const blocks = shuffle(blocksBase);
        const state = { blockIdx:0, contextIdx:0, data:[], previousChoice:{}, startTime:null };
        let trail;

        container.innerHTML = `
            <div class="mod-banner">MÓDULO 7 — FLEXIBILIDAD CONTEXTUAL (MOUSE-TRACKING)</div>
            <div class="mod-header"><h2>¿Qué lectura activa esta frase?</h2><p>Consigna: el mismo sustantivo aparece en varios contextos seguidos; elija qué significado activa en cada frase, lo más rápido que pueda.</p></div>
            <div class="mod-main">
                <button class="mod-back" onclick="App.goHome()">← Volver</button>
                <div class="progress-bar"><span id="blockLbl">Bloque 1/2</span><span id="ctxLbl">Contexto 1/4</span></div>
                <div class="progress-track"><div class="progress-fill" id="pf" style="width:12.5%"></div></div>
                <div class="card"><div id="trialSlot"></div></div>
            </div>
            <div class="modal" id="instrModal">
                <div class="modal-content"><h2>Flexibilidad contextual</h2>
                <p>Verá el mismo sustantivo en varios contextos seguidos (HOSPITAL y LIBRO). Indique qué lectura activa la palabra en cada frase, tan rápido como pueda.</p>
                <div class="modal-buttons"><button class="btn-modal primary" id="btnStart">Comenzar</button></div></div>
            </div>
            <div class="modal hidden" id="doneModal">
                <div class="modal-content" style="text-align:center;"><h2>¡Completado!</h2>
                <div class="stat-row">
                    <div class="stat"><div class="stat-value" id="sTotal">0</div><div class="stat-label">Contextos</div></div>
                    <div class="stat"><div class="stat-value" id="sSwitch">0</div><div class="stat-label">Cambios</div></div>
                </div>
                <div class="modal-buttons"><button class="btn-modal primary" id="btnBack">Volver al inicio</button></div></div>
            </div>
        `;
        trail = setupTrailCanvas(container.querySelector('.mod-main'));

        container.querySelector('#btnStart').addEventListener('click', () => {
            container.querySelector('#instrModal').classList.add('hidden');
            loadTrial();
        });
        container.querySelector('#btnBack').addEventListener('click', () => { trail.destroy(); onDone(); });

        function currentBlock() { return blocks[state.blockIdx]; }
        function currentContext() { return currentBlock().contexts[state.contextIdx]; }

        function loadTrial() {
            if (state.blockIdx >= blocks.length) return finish();
            if (state.contextIdx >= currentBlock().contexts.length) {
                state.blockIdx += 1; state.contextIdx = 0;
                if (state.blockIdx >= blocks.length) return finish();
            }
            const block = currentBlock(), ctx = currentContext();
            const totalCtx = blocks.reduce((s,b)=>s+b.contexts.length,0);
            const doneCtx = blocks.slice(0,state.blockIdx).reduce((s,b)=>s+b.contexts.length,0) + state.contextIdx;
            container.querySelector('#blockLbl').textContent = 'Bloque ' + (state.blockIdx+1) + '/' + blocks.length + ' — ' + block.noun.toUpperCase();
            container.querySelector('#ctxLbl').textContent = 'Contexto ' + (state.contextIdx+1) + '/' + block.contexts.length;
            container.querySelector('#pf').style.width = ((doneCtx+1)/totalCtx*100)+'%';
            container.querySelector('#trialSlot').innerHTML = `
                <div class="phrase-label">Frase</div>
                <div class="phrase">${highlightNoun(ctx.phrase, block.noun)}</div>
                <div class="options-row" id="optsRow">${block.options.map((o,i)=>`<button class="opt-btn" data-val="${o.replace(/"/g,'&quot;')}" disabled style="min-height:70px;">${o}</button>`).join('')}</div>`;
            trail.clear();
            armStartGate(container.querySelector('.card'), 'Coloque el cursor sobre el punto y espere para ver la frase y empezar', () => {
                trail.start(); state.startTime = Date.now();
                container.querySelectorAll('#optsRow button').forEach(b => { b.disabled = false; b.onclick = () => answer(b.dataset.val); });
            });
        }

        function answer(choice) {
            const traj = trail.stop();
            const rt = traj.length ? traj[traj.length-1].time : 0;
            const block = currentBlock(), ctx = currentContext();
            const prev = state.previousChoice[block.noun];
            const switched = prev !== undefined ? (prev !== choice) : null;
            state.data.push({
                block: block.noun, contextIndex: state.contextIdx+1, phrase: ctx.phrase, options: block.options,
                chosen: choice, expectedOrientative: ctx.expected, correct: (choice === ctx.expected),
                switchedFromPrevious: switched, rt_ms: rt, trajectory: traj
            });
            state.previousChoice[block.noun] = choice;
            state.contextIdx += 1;
            setTimeout(loadTrial, 250);
        }

        async function finish() {
            const total = state.data.length;
            const sw = state.data.filter(d=>d.switchedFromPrevious===true).length;
            container.querySelector('#sTotal').textContent = total;
            container.querySelector('#sSwitch').textContent = sw;
            container.querySelector('#doneModal').classList.remove('hidden');
            await finishModule('e7_flexibilidad:', 'flexibilidad_contextual', state.data);
        }
    }
    return { init };
})();
</script>

            if (!ok) {
                const ts = new Date().toISOString().replace(/[:.]/g,'-');
                downloadJSON('perfil_participante_' + ts + '.json', participantRecord);
            }
            document.getElementById('navHome').style.visibility = 'visible';
            document.getElementById('navAula').style.visibility = 'visible';
            document.getElementById('navProf').style.visibility = 'visible';
            onDone();
        };

        function pick(rowId, btn, setter) {
            root.querySelectorAll('#'+rowId+' button').forEach(x => x.classList.remove('selected'));
            btn.classList.add('selected');
            setter(btn.dataset.val);
            upd();
        }
        function upd() {
            root.querySelector('#btnIntakeGo').classList.toggle('ready', !!(state.consent && state.role && state.linguistics));
        }
    }
    return { start };
})();
</script>

<script>
/* ============================================================
   PANTALLA DE INICIO + ROUTER
   ============================================================ */
const EXPERIMENTS = [
    { id:'e1', num:1, title:'Rutas SI/NO', tag:'Mouse-tracking', level:'inicio', desc:'Juzgue si una ruta ya construida es correcta. Calentamiento rápido.', mod: () => MOD1 },
    { id:'e2', num:2, title:'Elección de ruta', tag:'Mouse-tracking', level:'inicio', desc:'Elija entre dos rutas posibles para la misma frase.', mod: () => MOD2 },
    { id:'e3', num:3, title:'Consenso experto', tag:'Debate en aula', level:'especialista', desc:'Acepte o no una ruta y estime cuánta gente coincidiría con usted.', mod: () => MOD3 },
    { id:'e4', num:4, title:'Granularidad', tag:'Individual', level:'especialista', desc:'Elija el nivel mínimo suficiente para 4 conceptos.', mod: () => MOD4 },
    { id:'e5', num:5, title:'ESMAS-ES+ vs MCR', tag:'Individual', level:'especialista', desc:'Compare dos representaciones para una tarea de referencia fija.', mod: () => MOD5 },
    { id:'e6', num:6, title:'Productividad ontológica', tag:'Árbol interactivo', level:'inicio', desc:'Clasifique 5 conceptos nuevos navegando el árbol real completo.', mod: () => MOD6 },
    { id:'e7', num:7, title:'Flexibilidad contextual', tag:'Mouse-tracking', level:'inicio', desc:'El mismo sustantivo en 4 contextos seguidos.', mod: () => MOD7 }
];
const LEVEL_LABELS = { inicio:'Iniciación', especialista:'Especialistas en anotación' };

const App = (function(){
    const root = document.getElementById('appRoot');

    function goHome() {
        Profesor.stopAula();
        setActiveNav('navHome');
        root.innerHTML = `
            <div class="home-wrap">
                <h2>Batería de experimentos ESMAS-ES+</h2>
                <div class="sub">Elija un experimento para empezar. Sus respuestas se envían automáticamente al terminar cada uno.</div>
                <div class="info-banner">
                    <b>Uso de los datos:</b> las respuestas se guardan de forma anónima, identificadas solo con un código de sesión aleatorio, y se usarán exclusivamente con fines de investigación y de docencia del proyecto ESMAS-ES+.
                </div>
                <div id="groupsWrap"></div>
                <div class="session-note">ID de sesión: ${SESSION_ID}</div>
                <div class="contact-line">📧 ¿Dudas, incidencias o archivos descargados que enviar? Escriba a <a href="mailto:${CONTACT_EMAIL}">${CONTACT_EMAIL}</a></div>
            </div>`;
        const groupsWrap = root.querySelector('#groupsWrap');
        ['inicio','especialista'].forEach(level => {
            const items = EXPERIMENTS.filter(e => e.level === level);
            if (!items.length) return;
            const groupTitle = document.createElement('div');
            groupTitle.className = 'group-title';
            groupTitle.textContent = LEVEL_LABELS[level];
            groupsWrap.appendChild(groupTitle);
            const sub = document.createElement('div');
            sub.className = 'group-sub';
            sub.textContent = level === 'inicio'
                ? 'Recomendadas para un primer contacto con la anotación semántica (p. ej. seminario práctico de iniciación).'
                : 'Requieren conocimientos previos sobre anotación semántica, acuerdo entre anotadores, granularidad u ontologías.';
            groupsWrap.appendChild(sub);
            const cardsRow = document.createElement('div');
            cardsRow.className = 'exp-cards';
            items.forEach(exp => {
                const card = document.createElement('div');
                card.className = 'exp-card';
                card.innerHTML = `<span class="num">${exp.num}</span><span class="level-badge ${exp.level}">${exp.level==='inicio'?'Iniciación':'Especialista'}</span><h3>${exp.title}</h3><p>${exp.desc}</p><span class="tag">${exp.tag}</span>`;
                card.onclick = () => runExperiment(exp);
                cardsRow.appendChild(card);
            });
            groupsWrap.appendChild(cardsRow);
        });
        setSaveStatus('Listo');
    }

    function runExperiment(exp) {
        Profesor.stopAula();
        setActiveNav(null);
        root.innerHTML = '';
        exp.mod().init(root, goHome);
    }

    function goProfesor() {
        Profesor.stopAula();
        setActiveNav('navProf');
        Profesor.render(root);
    }

    function goAula() {
        setActiveNav('navAula');
        Profesor.renderAula(root);
    }

    function setActiveNav(id) {
        document.getElementById('navHome').classList.toggle('active', id==='navHome');
        document.getElementById('navAula').classList.toggle('active', id==='navAula');
        document.getElementById('navProf').classList.toggle('active', id==='navProf');
    }

    return { goHome, goAula, goProfesor, runExperiment };
})();

/* ============================================================
   PANEL DE PROFESOR — lectura automática del almacenamiento
   compartido de los 7 módulos + carga manual de respaldo
   ============================================================ */
const Profesor = (function(){
    const EXP_META = {
        e1_sino:         { label:'1 · Rutas SI/NO' },
        e2_eleccion:     { label:'2 · Elección de ruta' },
        e3_consenso:     { label:'3 · Consenso experto' },
        e4_granularidad: { label:'4 · Granularidad' },
        e5_esmas_mcr:    { label:'5 · ESMAS-ES+ vs MCR' },
        e6_productividad:{ label:'6 · Productividad ontológica' },
        e7_flexibilidad: { label:'7 · Flexibilidad contextual' }
    };
    const PREFIXES = { e1_sino:'e1_sino:', e2_eleccion:'e2_eleccion:', e3_consenso:'e3_consenso:', e4_granularidad:'e4_granularidad:', e5_esmas_mcr:'e5_esmas_mcr:', e6_productividad:'e6_productividad:', e7_flexibilidad:'e7_flexibilidad:' };
    const ORDER = ['e1_sino','e2_eleccion','e3_consenso','e4_granularidad','e5_esmas_mcr','e6_productividad','e7_flexibilidad'];
    const PARTICIPANT_PREFIX = 'participant:';

    let buckets = { e1_sino:[], e2_eleccion:[], e3_consenso:[], e4_granularidad:[], e5_esmas_mcr:[], e6_productividad:[], e7_flexibilidad:[] };
    let participants = {}; // sessionId -> {role, linguisticsBackground, ageRange, ...}
    let active = null;

    function sessionIdFromSource(source, prefix) {
        if (!source || !source.startsWith(prefix)) return null;
        return source.slice(prefix.length);
    }

    // Reasigna la información del participante (cargo, formación, edad) a cada registro
    // de cada módulo, cruzando por el ID de sesión común. Se llama después de cualquier carga
    // (automática o manual) para que los cruces se mantengan siempre actualizados.
    function linkParticipants() {
        ORDER.forEach(key => {
            buckets[key].forEach(r => {
                const sid = r.sessionId || r._sessionId || sessionIdFromSource(r._source, PREFIXES[key]);
                r._sessionId = sid;
                r._participant = (sid && participants[sid]) ? participants[sid] : null;
            });
        });
    }

    function classifyManual(record) {
        if ('routeWasCorrect' in record && 'accurate' in record) return 'e1_sino';
        if ('routeA' in record && 'routeB' in record) return 'e2_eleccion';
        if ('estimatedConsensusPct' in record) return 'e3_consenso';
        if ('chosenLevel' in record) return 'e4_granularidad';
        if ('esmasRoute' in record) return 'e5_esmas_mcr';
        if ('navigationLog' in record) return 'e6_productividad';
        if ('switchedFromPrevious' in record) return 'e7_flexibilidad';
        return null;
    }

    function render(root) {
        root.innerHTML = `
            <div class="prof-wrap">
                <div class="info-banner" style="margin:0 0 16px;">
                    <b>Recuerde:</b> «Actualizar» solo trae datos nuevos si esta página es un <b>artefacto publicado de Claude</b> (con almacenamiento compartido activo). Si nada aparece aquí, pida a los participantes que suban aquí mismo el JSON que se les descargó automáticamente.
                    Recomendamos pulsar «⬇ Descargar consolidado» de vez en cuando durante el taller como copia de seguridad: el almacenamiento tiene un límite de tamaño y se borra por completo si el artefacto se despublica.
                </div>
                <div class="prof-toolbar">
                    <button class="btn-refresh" id="btnRefresh">🔄 Actualizar desde almacenamiento compartido</button>
                    <label class="upload-zone">📂 Cargar JSON manualmente (respaldo)<input type="file" id="fileInput" multiple accept=".json"></label>
                    <button class="btn-export" id="btnExport">⬇ Descargar consolidado</button>
                    <span class="status-line" id="profStatus">Sin cargar aún.</span>
                </div>
                <div class="prof-layout">
                    <div class="prof-nav" id="profNav"></div>
                    <div class="prof-main" id="profMain"><div style="color:#64748b;font-size:13px;padding:20px;">Pulsa «Actualizar» para leer las respuestas guardadas, o carga archivos JSON manualmente.</div></div>
                </div>
            </div>`;
        root.querySelector('#btnRefresh').onclick = refreshFromStorage;
        root.querySelector('#fileInput').addEventListener('change', e => handleManualFiles(e.target.files));
        root.querySelector('#btnExport').onclick = exportConsolidated;
        renderNav();
    }

    async function refreshFromStorage(silent) {
        const statusEl = document.getElementById('profStatus');
        if (statusEl) statusEl.textContent = 'Leyendo almacenamiento compartido...';
        let totalNew = 0;

        // 1) Participantes (cargo, formación, idade) — se leen primeiro para poder cruzalos.
        try {
            const listResult = await window.storage.list(PARTICIPANT_PREFIX, true);
            const keys = (listResult && listResult.keys) ? listResult.keys : [];
            for (const k of keys) {
                const sid = sessionIdFromSource(k, PARTICIPANT_PREFIX);
                if (!sid || participants[sid]) continue;
                try {
                    const res = await window.storage.get(k, true);
                    if (res && res.value) participants[sid] = JSON.parse(res.value);
                } catch(e) { console.error('Error leyendo participante', k, e); }
            }
        } catch(e) { console.error('Error listando participantes', e); }

        // 2) Resultados de cada módulo.
        for (const key of ORDER) {
            try {
                const listResult = await window.storage.list(PREFIXES[key], true);
                const keys = (listResult && listResult.keys) ? listResult.keys : [];
                const existingSources = new Set(buckets[key].map(r => r._source));
                for (const k of keys) {
                    if (existingSources.has(k)) continue;
                    try {
                        const res = await window.storage.get(k, true);
                        if (res && res.value) {
                            const parsed = JSON.parse(res.value);
                            if (Array.isArray(parsed)) {
                                parsed.forEach(r => buckets[key].push(Object.assign({ _source:k }, r)));
                                totalNew += parsed.length;
                            }
                        }
                    } catch(e) { console.error('Error leyendo', k, e); }
                }
            } catch(e) { console.error('Error listando', key, e); }
        }
        linkParticipants();
        if (statusEl) statusEl.textContent = 'Actualizado · ' + totalNew + ' registro(s) nuevos · ' + Object.keys(participants).length + ' participante(s) con datos de perfil.';
        renderNav();
    }

    function handleManualFiles(fileList) {
        const files = Array.from(fileList).filter(f => f.name.endsWith('.json'));
        let loaded = 0;
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = evt => {
                try {
                    const parsed = JSON.parse(evt.target.result);
                    const arr = Array.isArray(parsed) ? parsed : [parsed];
                    arr.forEach(r => {
                        if (r && 'consent' in r && 'sessionId' in r) {
                            // Archivo de perfil de participante (descargado cuando el guardado automático falla)
                            participants[r.sessionId] = r;
                            return;
                        }
                        const type = classifyManual(r);
                        if (type) buckets[type].push(Object.assign({ _source: file.name }, r));
                    });
                } catch(e) { console.error(e); }
                loaded++;
                if (loaded === files.length) {
                    linkParticipants();
                    document.getElementById('profStatus').textContent += ` (+${files.length} archivo(s) manuales)`;
                    renderNav();
                }
            };
            reader.readAsText(file);
        });
    }

    function bar(label, value, max, cls) {
        const pct = max > 0 ? Math.round(value/max*100) : 0;
        return `<div class="bar-row"><div class="bar-label" title="${label}">${label}</div><div class="bar-track"><div class="bar-fill ${cls||''}" style="width:${pct}%"></div></div><div class="bar-value">${value}</div></div>`;
    }
    function groupBy(arr, keyFn) { const g = {}; arr.forEach(r => { const k = keyFn(r); (g[k]=g[k]||[]).push(r); }); return g; }

    // Cruza un indicador (SÍ/NO, acierto, etc.) con los datos de perfil del participante (cargo, formación).
    // matchFn(record) -> boolean indicando si el registro cuenta como "positivo" para la métrica.
    function demoBreakdown(data, matchFn, title) {
        const withProfile = data.filter(d => d._participant);
        if (!withProfile.length) return `<div class="panel"><h4>${title}</h4><div style="font-size:11px;color:#64748b;">Ninguno de estos registros tiene todavía datos de perfil vinculados (solo disponible cuando el participante completó la pantalla de acceso y el guardado fue automático).</div></div>`;
        let html = `<div class="panel"><h4>${title}</h4><div style="font-size:11px;color:#94a3b8;margin-bottom:8px;">${withProfile.length} de ${data.length} registros con perfil vinculado</div>`;
        html += '<div style="font-size:11px;color:#c084fc;margin-bottom:4px;">Por cargo</div>';
        Object.entries(groupBy(withProfile, r=>r._participant.role||'Sin datos')).forEach(([role,rs]) => html += bar(role, rs.filter(matchFn).length, rs.length, 'green'));
        html += '<div style="font-size:11px;color:#c084fc;margin:10px 0 4px;">Por formación en lingüística</div>';
        Object.entries(groupBy(withProfile, r=>r._participant.linguisticsBackground||'Sin datos')).forEach(([ling,rs]) => html += bar(ling, rs.filter(matchFn).length, rs.length, 'green'));
        html += '</div>';
        return html;
    }

    function renderNav() {
        const nav = document.getElementById('profNav');
        if (!nav) return;
        nav.innerHTML = '';
        const pCount = Object.keys(participants).length;
        const pBtn = document.createElement('button');
        pBtn.innerHTML = `👤 Participantes <span class="count">${pCount}</span>`;
        pBtn.disabled = pCount === 0;
        pBtn.onclick = () => { active = '_participants'; renderNav(); renderParticipants(); };
        if (active === '_participants') pBtn.classList.add('active');
        nav.appendChild(pBtn);
        ORDER.forEach(key => {
            const n = buckets[key].length;
            const btn = document.createElement('button');
            btn.innerHTML = `${EXP_META[key].label} <span class="count">${n}</span>`;
            btn.disabled = n === 0;
            btn.onclick = () => { active = key; renderNav(); renderMain(key); };
            if (key === active) btn.classList.add('active');
            nav.appendChild(btn);
        });
        if (!active) { const first = ORDER.find(k => buckets[k].length>0); if (first) { active = first; renderMain(active); } }
    }

    function renderParticipants() {
        const main = document.getElementById('profMain');
        if (!main) return;
        const list = Object.values(participants);
        if (!list.length) { main.innerHTML = '<div style="color:#64748b;">Sin datos de participantes todavía.</div>'; return; }
        let html = `<h3 style="color:#a855f7;margin-bottom:4px;">Participantes</h3><div style="font-size:12px;color:#94a3b8;margin-bottom:16px;">${list.length} persona(s) con consentimiento registrado</div>`;
        html += '<div class="panel"><h4>Por cargo</h4>';
        Object.entries(groupBy(list, p=>p.role||'Sin datos')).forEach(([role,ps]) => html += bar(role, ps.length, list.length));
        html += '</div><div class="panel"><h4>Por formación en lingüística</h4>';
        Object.entries(groupBy(list, p=>p.linguisticsBackground||'Sin datos')).forEach(([ling,ps]) => html += bar(ling, ps.length, list.length));
        html += '</div><div class="panel"><h4>Por edad</h4>';
        Object.entries(groupBy(list, p=>p.ageRange||'Sin datos')).forEach(([age,ps]) => html += bar(age, ps.length, list.length));
        html += '</div>';
        main.innerHTML = html;
    }

    function renderMain(key) {
        const data = buckets[key];
        const main = document.getElementById('profMain');
        if (!main) return;
        if (!data.length) { main.innerHTML = '<div style="color:#64748b;">Sin datos.</div>'; return; }
        let html = `<h3 style="color:#a855f7;margin-bottom:4px;">${EXP_META[key].label}</h3><div style="font-size:12px;color:#94a3b8;margin-bottom:16px;">${data.length} registros</div>`;

        if (key === 'e1_sino') {
            const total = data.length, accurate = data.filter(d=>d.accurate).length;
            html += `<div class="panel"><h4>Aciertos globales: ${Math.round(accurate/total*100)}% (${accurate}/${total})</h4>
                <div style="font-size:11px;color:#94a3b8;margin-bottom:10px;">Ordenado de más a menos problemático. Con pocas respuestas por frase, cada barra vale 0% o 100%; la proporción solo se estabiliza cuando se suman más participantes.</div>`;
            const byPhrase = groupBy(data, d => d.phrase);
            const rows = Object.entries(byPhrase).map(([phrase,recs]) => ({ phrase, recs, acc: recs.filter(r=>r.accurate).length / recs.length }));
            rows.sort((a,b) => a.acc - b.acc);
            rows.forEach(({phrase,recs}) => html += bar(phrase + ' (n=' + recs.length + ')', recs.filter(r=>r.accurate).length, recs.length, 'green'));
            html += '</div>';
            html += demoBreakdown(data, r=>r.accurate, 'Aciertos por perfil del participante');
        } else if (key === 'e2_eleccion') {
            const isCorrectE2 = r => r.correct !== undefined ? r.correct : (r.correctRoute ? r.chosenRoute === r.correctRoute : null);
            const withAnswer = data.filter(d => isCorrectE2(d) !== null);
            if (withAnswer.length) {
                const accE2 = withAnswer.filter(isCorrectE2).length;
                html += `<div class="panel"><h4>Aciertos globales: ${Math.round(accE2/withAnswer.length*100)}% (${accE2}/${withAnswer.length})</h4>
                    <div style="font-size:11px;color:#94a3b8;">El orden A/B se aleatoriza por sesión; el acierto se calcula por el contenido de la ruta elegida, no por su posición en pantalla.</div></div>`;
            }
            const byPhrase = groupBy(data, d => d.phrase);
            html += '<div class="panel"><h4>Ruta elegida por frase</h4>';
            Object.entries(byPhrase).forEach(([phrase,recs]) => {
                const correctRoute = recs[0].correctRoute;
                const acc = correctRoute ? recs.filter(isCorrectE2).length : null;
                html += `<div style="margin-bottom:12px;"><div style="font-size:13px;color:#f5f3ff;">${phrase}${acc!==null ? ` — ${Math.round(acc/recs.length*100)}% acierto` : ''}</div>`;
                Object.entries(groupBy(recs, r=>r.chosenRoute)).forEach(([route,rs]) => {
                    const label = route + (route === correctRoute ? '<span class="expected-tag">correcta</span>' : '');
                    html += bar(label, rs.length, recs.length, route === correctRoute ? 'green' : undefined);
                });
                html += '</div>';
            });
            html += '</div>';
            html += demoBreakdown(withAnswer, isCorrectE2, 'Aciertos por perfil del participante');
        } else if (key === 'e3_consenso') {
            const byNoun = groupBy(data, d => d.noun);
            html += '<div class="panel"><h4>Aceptación (SÍ) por ítem</h4>';
            Object.entries(byNoun).forEach(([noun,recs]) => html += bar(noun+' — '+recs[0].route, recs.filter(r=>r.accept==='SÍ').length, recs.length, 'green'));
            html += '</div>';
            const rc = {}; data.forEach(d => (d.disagreementReasons||[]).forEach(r => rc[r]=(rc[r]||0)+1));
            const maxR = Math.max(1, ...Object.values(rc));
            html += '<div class="panel"><h4>Motivos de desacuerdo</h4>';
            Object.entries(rc).sort((a,b)=>b[1]-a[1]).forEach(([r,c]) => html += bar(r,c,maxR));
            html += '</div>';
            html += demoBreakdown(data, r=>r.accept==='SÍ', 'Aceptación (SÍ) por perfil del participante');
        } else if (key === 'e4_granularidad') {
            const byNoun = groupBy(data, d => d.noun);
            html += '<div class="panel"><h4>Profundidad media elegida</h4>';
            Object.entries(byNoun).forEach(([noun,recs]) => { const avg = recs.reduce((s,r)=>s+r.depth,0)/recs.length; html += bar(noun+` (${avg.toFixed(1)}/${recs[0].maxDepth})`, avg, recs[0].maxDepth); });
            html += '</div><div class="panel"><h4>Confianza media (1-7)</h4>';
            Object.entries(byNoun).forEach(([noun,recs]) => { const avg = recs.reduce((s,r)=>s+r.confidence,0)/recs.length; html += bar(noun, avg.toFixed(1), 7); });
            html += '</div>';
        } else if (key === 'e5_esmas_mcr') {
            const byNoun = groupBy(data, d => d.noun);
            html += '<div class="panel"><h4>Preferencia por ítem</h4>';
            Object.entries(byNoun).forEach(([noun,recs]) => {
                html += `<div style="margin-bottom:12px;"><div style="font-size:13px;color:#f5f3ff;">${noun} (${recs[0].domain})</div>`;
                Object.entries(groupBy(recs, r=>r.preference)).forEach(([pref,rs]) => html += bar(pref, rs.length, recs.length));
                html += '</div>';
            });
            html += '</div>';
            const comments = data.filter(d => d.comment && d.comment.trim());
            if (comments.length) { html += '<div class="panel"><h4>Comentarios</h4>'; comments.forEach(c => html += `<div class="comment-item"><div class="meta">${c.noun}</div>${c.comment}</div>`); html += '</div>'; }
            html += demoBreakdown(data, r=>r.preference==='ESMAS-ES+', 'Preferencia por ESMAS-ES+ según perfil del participante');
        } else if (key === 'e6_productividad') {
            const byNoun = groupBy(data, d => d.noun);
            html += '<div class="panel"><h4>Rutas finales por ítem</h4>';
            Object.entries(byNoun).forEach(([noun,recs]) => {
                html += `<div style="margin-bottom:12px;"><div style="font-size:13px;color:#f5f3ff;">${noun}</div>`;
                Object.entries(groupBy(recs, r=>r.finalRoute)).forEach(([route,rs]) => html += bar(route, rs.length, recs.length));
                html += '</div>';
            });
            html += '</div>';
            html += `<div class="panel"><h4>Dificultad por ítem (no hay ruta "correcta": esto indica dónde costó más decidir)</h4>
                <div style="font-size:11px;color:#94a3b8;margin-bottom:10px;">Ordenado de más a menos retrocesos + cambios de rama de media. Útil para el debate en clase: aquí es donde conviene debatir, no tanto en acierto/error.</div>`;
            const diffRows = Object.entries(byNoun).map(([noun,recs]) => ({
                noun, n: recs.length,
                avgClicks: recs.reduce((s,r)=>s+r.clicks,0)/recs.length,
                avgBack: recs.reduce((s,r)=>s+r.backtracks,0)/recs.length,
                avgBranch: recs.reduce((s,r)=>s+r.branchChanges,0)/recs.length
            }));
            diffRows.sort((a,b) => (b.avgBack+b.avgBranch) - (a.avgBack+a.avgBranch));
            const maxDiff = Math.max(1, ...diffRows.map(r=>r.avgBack+r.avgBranch));
            diffRows.forEach(r => html += bar(r.noun + ` (n=${r.n} · clics ${r.avgClicks.toFixed(1)} · retrocesos ${r.avgBack.toFixed(1)} · cambios rama ${r.avgBranch.toFixed(1)})`, (r.avgBack+r.avgBranch).toFixed(1), maxDiff, 'pink'));
            html += '</div>';
            html += `<div class="stat-row"><div class="stat"><div class="stat-value">${(data.reduce((s,d)=>s+d.clicks,0)/data.length).toFixed(1)}</div><div class="stat-label">Clics medios (global)</div></div>
                <div class="stat"><div class="stat-value">${(data.reduce((s,d)=>s+d.backtracks,0)/data.length).toFixed(1)}</div><div class="stat-label">Retrocesos (global)</div></div>
                <div class="stat"><div class="stat-value">${(data.reduce((s,d)=>s+d.branchChanges,0)/data.length).toFixed(1)}</div><div class="stat-label">Cambios de rama (global)</div></div></div>`;
            const comments = data.filter(d => d.comment && d.comment.trim());
            if (comments.length) { html += '<div class="panel"><h4>Comentarios</h4>'; comments.forEach(c => html += `<div class="comment-item"><div class="meta">${c.noun}</div>${c.comment}</div>`); html += '</div>'; }
        } else if (key === 'e7_flexibilidad') {
            const isCorrect = r => r.correct !== undefined ? r.correct : (r.chosen === r.expectedOrientative);
            const totalE7 = data.length, accE7 = data.filter(isCorrect).length;
            html += `<div class="panel"><h4>Aciertos globales: ${Math.round(accE7/totalE7*100)}% (${accE7}/${totalE7})</h4>
                <div style="font-size:11px;color:#94a3b8;margin-bottom:2px;">"Cambio de lectura" indica si la persona cambió de significado respecto a su propia respuesta anterior para el mismo sustantivo (es lo esperado cuando el contexto cambia). La opción marcada con <span class="expected-tag">correcta</span> es la lectura que ese contexto activa según el diseño del ítem.</div></div>`;
            Object.entries(groupBy(data, d => d.block)).forEach(([blockNoun, recs]) => {
                html += `<div class="panel"><h4>Bloque: ${blockNoun.toUpperCase()}</h4>`;
                Object.entries(groupBy(recs, r => r.contextIndex + ' — ' + r.phrase)).sort((a,b)=>a[0].localeCompare(b[0],'es',{numeric:true})).forEach(([ctx,rs]) => {
                    const expected = rs[0].expectedOrientative;
                    const accCtx = rs.filter(isCorrect).length;
                    html += `<div style="margin-bottom:10px;"><div style="font-size:11px;color:#94a3b8;">${ctx} (n=${rs.length}) — ${Math.round(accCtx/rs.length*100)}% acierto</div>`;
                    Object.entries(groupBy(rs, r=>r.chosen)).forEach(([choice,cs]) => {
                        const label = choice + (choice === expected ? '<span class="expected-tag">correcta</span>' : '');
                        html += bar(label, cs.length, rs.length, choice === expected ? 'green' : 'pink');
                    });
                    html += '</div>';
                });
                const sw = recs.filter(r=>r.switchedFromPrevious===true).length, ev = recs.filter(r=>r.switchedFromPrevious!==null).length;
                html += `<div style="font-size:12px;color:#c084fc;">Tasa de cambio de lectura (respecto á resposta anterior no mesmo bloque): ${ev?Math.round(sw/ev*100):0}% (${sw} de ${ev} respostas comparables)</div></div>`;
            });
            html += demoBreakdown(data, isCorrect, 'Aciertos por perfil del participante');
            html += demoBreakdown(data.filter(r=>r.switchedFromPrevious!==null), r=>r.switchedFromPrevious===true, 'Cambios de lectura por perfil del participante');
        }
        main.innerHTML = html;
    }

    function exportConsolidated() {
        const all = [];
        ORDER.forEach(key => buckets[key].forEach(r => all.push(Object.assign({ _experiment:key }, r))));
        Object.entries(participants).forEach(([sid,p]) => all.push(Object.assign({ _experiment:'participant', _sessionId:sid }, p)));
        if (!all.length) { alert('No hay datos cargados todavía.'); return; }
        const blob = new Blob([JSON.stringify(all,null,2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const ts = new Date().toISOString().replace(/[:.]/g,'-');
        a.href = url; a.download = `consolidado_ESMAS_ES_${ts}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    /* ============================================================
       VISTA DE AULA — resumen simplificado para proyectar en clase.
       Reutiliza los mismos `buckets`/`participants` ya cargados por
       el Modo profesor; si aún no hay nada cargado, ofrece el mismo
       botón de actualizar. Deliberadamente NO muestra desgloses
       demográficos ni comentarios en bruto — eso se queda para el
       Modo profesor (análisis posterior), no para la pantalla compartida.
       ============================================================ */
    let aulaActive = null;
    let aulaInterval = null;

    function stopAulaAutoRefresh() {
        if (aulaInterval) { clearInterval(aulaInterval); aulaInterval = null; }
    }

    function renderAula(root) {
        root.innerHTML = `
            <div class="aula-wrap">
                <div class="aula-toolbar" id="aulaTabs"></div>
                <div class="aula-status" id="aulaStatus">Actualizando automáticamente cada 15 s… (también puedes pulsar «Actualizar»)</div>
                <div id="aulaMain"></div>
            </div>`;
        renderAulaTabs();
        if (!aulaActive) {
            const first = ORDER.find(k => buckets[k].length>0);
            if (first) { aulaActive = first; renderAulaMain(aulaActive); }
            else document.getElementById('aulaMain').innerHTML = '<div class="aula-empty">Todavía no hay respuestas.<br>Pulsa «Actualizar» arriba.</div>';
        } else {
            renderAulaMain(aulaActive);
        }
        stopAulaAutoRefresh();
        aulaInterval = setInterval(async () => {
            const statusEl = document.getElementById('aulaStatus');
            if (!statusEl) { stopAulaAutoRefresh(); return; } // ya no estamos en esta vista
            await refreshFromStorage(true);
            renderAulaTabs();
            if (aulaActive) renderAulaMain(aulaActive);
            const s = document.getElementById('aulaStatus');
            if (s) s.textContent = 'Actualizado automáticamente · ' + new Date().toLocaleTimeString();
        }, 15000);
    }

    function renderAulaTabs() {
        const wrap = document.getElementById('aulaTabs');
        if (!wrap) return;
        wrap.innerHTML = '';
        const refreshBtn = document.createElement('button');
        refreshBtn.className = 'aula-refresh';
        refreshBtn.textContent = '🔄 Actualizar';
        refreshBtn.onclick = async () => {
            document.getElementById('aulaStatus').textContent = 'Leyendo almacenamiento compartido...';
            await refreshFromStorage(true);
            document.getElementById('aulaStatus').textContent = 'Actualizado · ' + new Date().toLocaleTimeString();
            renderAulaTabs();
            if (aulaActive) renderAulaMain(aulaActive);
        };
        wrap.appendChild(refreshBtn);
        ORDER.forEach(key => {
            const n = buckets[key].length;
            const btn = document.createElement('button');
            btn.className = 'aula-tab' + (key === aulaActive ? ' active' : '');
            btn.textContent = EXP_META[key].label.replace(/^\d+ · /, (m)=>m);
            btn.disabled = n === 0;
            btn.onclick = () => { aulaActive = key; renderAulaTabs(); renderAulaMain(key); };
            wrap.appendChild(btn);
        });
    }

    function aulaBar(label, value, max, cls) {
        const pct = max > 0 ? Math.round(value/max*100) : 0;
        return `<div class="aula-bar-row"><div class="aula-bar-label">${label}</div><div class="aula-bar-track"><div class="aula-bar-fill ${cls||''}" style="width:${Math.max(pct,6)}%"><span class="aula-bar-value">${pct}%</span></div></div></div>`;
    }

    function renderAulaMain(key) {
        const data = buckets[key];
        const main = document.getElementById('aulaMain');
        if (!main) return;
        if (!data.length) { main.innerHTML = '<div class="aula-empty">Sin datos todavía para este experimento.</div>'; return; }

        let html = `<div class="aula-title">${EXP_META[key].label}</div><div class="aula-question">${data.length} respuesta(s) recibidas</div>`;

        if (key === 'e1_sino') {
            const total = data.length, acc = data.filter(d=>d.accurate).length;
            html += `<div class="aula-stat-row"><div class="aula-stat"><div class="num">${Math.round(acc/total*100)}%</div><div class="lbl">Aciertos globales</div></div></div>`;
            html += '<div class="aula-section-title">Los 3 ítems más divididos</div>';
            html += '<div style="text-align:center;font-size:14px;color:#94a3b8;margin-bottom:18px;max-width:700px;margin-left:auto;margin-right:auto;">"Más dividido" = donde el grupo estuvo más repartido entre Sí y No (más cerca del 50%), no el que más tiempo llevó decidir. El tiempo medio de respuesta se muestra aparte, por si ayuda a leer la dificultad.</div>';
            const rows = Object.entries(groupBy(data, d=>d.phrase)).map(([phrase,recs]) => ({
                phrase, recs, acc: recs.filter(r=>r.accurate).length/recs.length,
                avgRt: recs.reduce((s,r)=>s+(r.rt_ms||0),0)/recs.length/1000
            }));
            rows.sort((a,b) => Math.abs(a.acc-0.5) - Math.abs(b.acc-0.5)).slice(0,3).forEach(r => {
                html += `<div style="text-align:center;font-size:16px;color:#e2e8f0;margin-bottom:6px;">${r.phrase} — ruta propuesta: <span style="color:#c084fc;">"${r.recs[0].route}"</span> <span style="color:#64748b;font-size:13px;">(${r.avgRt.toFixed(1)}s de media)</span></div>`;
                html += aulaBar('¿Es correcta?', r.recs.filter(x=>x.accurate).length, r.recs.length, 'green');
            });
        } else if (key === 'e2_eleccion') {
            const isCorrectE2 = r => r.correct !== undefined ? r.correct : (r.correctRoute ? r.chosenRoute === r.correctRoute : null);
            const withAnswer = data.filter(d => isCorrectE2(d) !== null);
            if (withAnswer.length) {
                const accE2 = withAnswer.filter(isCorrectE2).length;
                html += `<div class="aula-stat-row"><div class="aula-stat"><div class="num">${Math.round(accE2/withAnswer.length*100)}%</div><div class="lbl">Aciertos globales</div></div></div>`;
            }
            html += '<div class="aula-section-title">Las frases más y menos acertadas</div>';
            const rows = Object.entries(groupBy(withAnswer, d=>d.phrase)).map(([phrase,recs]) => ({
                phrase, recs, acc: recs.filter(isCorrectE2).length / recs.length,
                avgRt: recs.reduce((s,r)=>s+(r.rt_ms||0),0)/recs.length/1000
            }));
            rows.sort((a,b) => a.acc - b.acc);
            rows.forEach(r => {
                const correctRoute = r.recs[0].correctRoute;
                html += `<div style="text-align:center;font-size:16px;color:#e2e8f0;margin-top:20px;margin-bottom:8px;">${r.phrase} <span style="color:#64748b;font-size:13px;">(${r.avgRt.toFixed(1)}s de media)</span></div>`;
                const byRoute = groupBy(r.recs, x=>x.chosenRoute);
                Object.entries(byRoute).forEach(([route,rs]) => {
                    const label = (route === correctRoute ? '✅ ' : '') + route + (route === correctRoute ? '<span class="expected-tag">correcta</span>' : '');
                    html += aulaBar(label, rs.length, r.recs.length, route === correctRoute ? 'green' : 'pink');
                });
            });
        } else if (key === 'e3_consenso') {
            const byNoun = groupBy(data, d=>d.noun);
            const rows = Object.entries(byNoun).map(([noun,recs]) => ({ noun, recs, si: recs.filter(r=>r.accept==='SÍ').length }));
            rows.sort((a,b) => Math.abs(a.si/a.recs.length-0.5) - Math.abs(b.si/b.recs.length-0.5));
            html += '<div class="aula-section-title">Los 3 ítems con más división</div>';
            rows.slice(0,3).forEach(r => html += aulaBar(r.noun, r.si, r.recs.length, 'green'));
        } else if (key === 'e4_granularidad') {
            const byNoun = groupBy(data, d=>d.noun);
            html += '<div class="aula-section-title">Profundidad media elegida</div>';
            Object.entries(byNoun).forEach(([noun,recs]) => { const avg = recs.reduce((s,r)=>s+r.depth,0)/recs.length; html += aulaBar(noun, avg, recs[0].maxDepth); });
        } else if (key === 'e5_esmas_mcr') {
            const byPref = groupBy(data, d=>d.preference);
            html += '<div class="aula-section-title">Preferencia global (los 6 ítems juntos)</div>';
            Object.entries(byPref).forEach(([pref,rs]) => html += aulaBar(pref, rs.length, data.length));
            const comments = data.filter(d => d.comment && d.comment.trim());
            if (comments.length) {
                html += '<div class="aula-section-title" style="margin-top:30px;">Una propuesta del grupo</div>';
                const pick = comments[Math.floor(Math.random()*comments.length)];
                html += `<div class="aula-comment">"${pick.comment}" <span style="color:#94a3b8;font-size:13px;">— sobre "${pick.noun}"</span></div>`;
            }
        } else if (key === 'e6_productividad') {
            const byNoun = groupBy(data, d=>d.noun);
            const rows = Object.entries(byNoun).map(([noun,recs]) => {
                const byRoute = groupBy(recs, r=>r.finalRoute);
                const modal = Object.entries(byRoute).sort((a,b)=>b[1].length-a[1].length)[0];
                const dif = recs.reduce((s,r)=>s+r.backtracks+r.branchChanges,0)/recs.length;
                const avgRt = recs.reduce((s,r)=>s+(r.rt_ms||0),0)/recs.length/1000;
                return { noun, recs, modalRoute: modal[0], modalCount: modal[1].length, agreement: modal[1].length/recs.length, dif, avgRt };
            });
            rows.sort((a,b) => a.agreement - b.agreement);
            html += '<div class="aula-section-title">Consenso del grupo — ruta más elegida por concepto</div>';
            html += '<div style="text-align:center;font-size:14px;color:#94a3b8;margin-bottom:18px;max-width:700px;margin-left:auto;margin-right:auto;">Ordenado de menos a más consenso. La barra muestra cuánta gente coincidió en la ruta más votada para ese concepto — no hay respuesta correcta, aquí interesa el grado de acuerdo.</div>';
            rows.forEach(r => html += aulaBar(`${r.noun} — "${r.modalRoute}"`, r.modalCount, r.recs.length));

            const difRows = [...rows].sort((a,b) => b.dif - a.dif);
            const maxDif = Math.max(...difRows.map(r=>r.dif));
            html += '<div class="aula-section-title" style="margin-top:34px;">Dificultad por concepto (retrocesos + cambios de rama)</div>';
            html += '<div style="text-align:center;font-size:14px;color:#94a3b8;margin-bottom:18px;max-width:700px;margin-left:auto;margin-right:auto;">Cuantos más retrocesos y cambios de rama, más costó encajar el concepto en el árbol. El tiempo medio de navegación se muestra como referencia adicional, no sustituye a esta medida.</div>';
            if (maxDif === 0) {
                html += '<div style="text-align:center;color:#64748b;font-size:15px;">Con las respuestas recibidas hasta ahora, ningún concepto muestra más retrocesos o cambios de rama que otro (todos en 0) — aún no hay diferencia de dificultad que mostrar.</div>';
            } else {
                difRows.forEach(r => html += aulaBar(`${r.noun} (${r.avgRt.toFixed(1)}s de media)`, r.dif.toFixed(1), maxDif));
            }
        } else if (key === 'e7_flexibilidad') {
            const isCorrectAula = r => r.correct !== undefined ? r.correct : (r.chosen === r.expectedOrientative);
            const totalE7a = data.length, accE7a = data.filter(isCorrectAula).length;
            html += `<div class="aula-stat-row"><div class="aula-stat"><div class="num">${Math.round(accE7a/totalE7a*100)}%</div><div class="lbl">Aciertos globales</div></div></div>`;
            html += '<div class="aula-section-title">Las frases más y menos acertadas</div>';
            const rows = Object.entries(groupBy(data, d => d.block + ' · ' + d.contextIndex + ' — ' + d.phrase)).map(([label,recs]) => ({
                label, recs, acc: recs.filter(isCorrectAula).length / recs.length,
                avgRt: recs.reduce((s,r)=>s+(r.rt_ms||0),0)/recs.length/1000
            }));
            rows.sort((a,b) => a.acc - b.acc);
            rows.forEach(r => html += aulaBar(`${r.label} (${r.avgRt.toFixed(1)}s de media)`, r.recs.filter(isCorrectAula).length, r.recs.length, 'green'));
            html += '<div class="aula-section-title" style="margin-top:34px;">Cambios de lectura por bloque</div>';
            html += `<div style="text-align:center;font-size:14px;color:#94a3b8;margin-bottom:18px;max-width:700px;margin-left:auto;margin-right:auto;">
                Por ejemplo, en el bloque HOSPITAL: si alguien respondió "Organización" en el contexto 2 y luego "Lugar" en el contexto 4, eso cuenta como un cambio de lectura — es justo lo que se espera, porque el contexto cambió y debía cambiar la interpretación con él. Un cambio de lectura no es un error; lo contrario (no cambiar cuando el contexto sí lo pedía) sería la señal a vigilar. El número entre paréntesis es el recuento real (con poca gente, el % puede ser engañoso).</div>`;
            Object.entries(groupBy(data, d=>d.block)).forEach(([blockNoun, recs]) => {
                const sw = recs.filter(r=>r.switchedFromPrevious===true).length, ev = recs.filter(r=>r.switchedFromPrevious!==null).length;
                html += aulaBar(blockNoun.toUpperCase() + ` (${sw} de ${ev} cambiaron)`, sw, ev||1, 'pink');
            });
        }
        main.innerHTML = html;
    }

    return { render, renderAula, stopAula: stopAulaAutoRefresh };
})();

/* Arranque */
Intake.start(App.goHome);
</script>
